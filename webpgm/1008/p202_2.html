<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>설문조사</title>
  <style>
    body{
      background-color: aliceblue;
    }
    h1{
      color:darkred;
    }
    div {
      background-color: pink;
    }
    header {
      text-align: center;
    }
    p {
      font-size: 1.2em;
    }
    .blue{
      font-size: 1em;
      color:darkblue;
      font-weight: bold;
    }
    label, input, textarea, select {
      font-size: 1em;
    }
    footer {
      background-color: orange;
      border-top: 2px solid;
      border-radius: 20px;
    }
  </style>
</head>
<body>
<header>
  <h1>설문지</h1>
  <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
</header>
<hr>
<div>
<form action="/submit_survey" method="post">
  <section>
    <article>
      <div class="blue"><label>학년:</label></div>
      <input type="radio" id="grade1" name="grade" value="1학년">
      <label for="grade1">1학년</label>

      <input type="radio" id="grade2" name="grade" value="2학년">
      <label for="grade2">2학년</label>

      <input type="radio" id="grade3" name="grade" value="3학년">
      <label for="grade3">3학년</label>

      <input type="radio" id="grade4" name="grade" value="4학년">
      <label for="grade4">4학년</label><br>
    </article>

    <article>
      <div class="blue"><label>성별:</label></div>
      <input type="radio" id="male" name="gender" value="남성">
      <label for="male">남성</label>

      <input type="radio" id="female" name="gender" value="여성">
      <label for="female">여성</label><br>
    </article>

    <article>
      <div class="blue"><label for="interest">관심 분야:</label></div>
      <select id="interest" name="interest">
        <option value="개발">개발</option>
        <option value="마케팅">마케팅</option>
        <option value="영업">영업</option>
        <option value="창업">창업</option>
      </select>
    </article>
    <article>
      <dic class = "blue">진로 (다중 선택)</dic>
      <input type="radio">
      <label>개발</label>

      <input type="radio">
      <label>기획</label>

      <input type="radio">
      <label>영업</label>

      <input type="radio">
      <label>창업</label><br>
    </article>

    <article>
      <textarea id="comments" name="comments" rows="4" cols="50"></textarea>
      <div class = "blue"><label for="comments">남기고 싶은 말:</label></div>
    </article>
  </section>
</form>
</div>
<footer>
  <p>Copyright 2022 by Kitae</p>
</footer>
</body>
</html>
