<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>텍스트와 꾸미기</title>
  <style>
    h3{
      font-weight: bold;
      font-size: 15px;
    }
    p{
      background-color: lightsteelblue;
      color: darkred;
    }
    span{
      font-size: 30px;
      text-decoration: underline;;
    }
  </style>
</head>
<body>
<h3>텍스트와 폰트</h3>
<hr>
<p>AliceBlue 바탕색에 Brown 색의 "Lucida Console" 폰트로 10px 크기이고 <span>저는 이보다 1.5배 큽니다.</span></p>
</body>
</html>
