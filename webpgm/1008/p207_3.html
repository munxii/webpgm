<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>색 테이블 만들기</title>
    <style>
        table {
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            width: 16.66%;
            height: 50px;
            text-align: center;
        }
        tbody th {
            font-weight: normal;
        }
        </style>
</head>
<body>
<h3>색 이름과 코드</h3>
<hr>
<table border="1">

    <thead>
    <tr>
        <th>이름</th><th>코드</th><th>색</th><th>이름</th><th>코드</th><th>색</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <th>Brown</th><th>#A52A2A</th><th style="background-color: #A52A2A;"></th><th>Deepskyblue</th><th>#00BFFF</th><th style="background-color: #00BFFF;"></th>
    </tr>
    <tr>
        <th>Blueviolet</th><th>#8A2BE2</th><th style="background-color: #8A2BE2;"></th><th>Gold</th><th>#FFD700</th><th style="background-color: #FFD700;"></th>
    </tr>
    <tr>
        <th>Darkorange</th><th>#FF8C00</th><th style="background-color: #FF8C00;"></th><th>Olivedrab</th><th>#6B8E23</th><th style="background-color: #6B8E23;"></th>
    </tr>
    </tbody>
</table>

</body>
</html>
